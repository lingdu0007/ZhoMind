<h2>网格极简布局草图</h2>
<p class="subtitle">12 列网格，侧栏占 2 列，主内容 8 列，右侧保留 2 列留白。顶部加入轻量控制条与会话抽屉。</p>

<div class="mockup">
  <div class="mockup-body">
    <div class="split">
      <div class="mockup" style="flex:2;border-right:1px solid #CBD5F5;background:#F8FAFC;">
        <div class="mock-nav" style="justify-content:flex-start;">Logo ｜ ZhoMind</div>
        <div class="mock-sidebar" style="height:240px;">
          <p>导航</p>
          <ul>
            <li>聊天</li>
            <li>文档</li>
            <li>配置</li>
          </ul>
        </div>
      </div>
      <div class="mockup" style="flex:8;padding:24px;">
        <div class="mock-button" style="display:flex;justify-content:space-between;">
          <span>Chat · Knowledge Pulse</span>
          <button class="mock-button">会话 ▼</button>
        </div>
        <div class="placeholder" style="margin-top:16px;height:120px;">会话抽屉（展开列表，带滚动）</div>
        <div class="placeholder" style="margin-top:16px;height:240px;">聊天消息流（卡片样式，留白）</div>
        <div class="mock-input" style="margin-top:16px;">输入框</div>
        <div class="mock-button" style="margin-top:8px;justify-content:flex-end;gap:8px;">
          <button class="mock-button">停止</button>
          <button class="mock-button">发送</button>
        </div>
      </div>
      <div class="mockup" style="flex:2;background:#F8FAFC;">
        <div class="placeholder" style="height:100%;">留白/后续扩展</div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>上传页</h3>
  <p>顶部上传卡片 + 下方极简表格，表格使用 1px 细线与浅色 zebra lines。</p>
</div>

<div class="section">
  <h3>配置页</h3>
  <p>多卡片并列在 12 列网格内：每卡片跨 6 列，包含标题、说明、对应表单项与保存按钮。</p>
</div>
